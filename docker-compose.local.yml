services:
  repo:
    image: public.ecr.aws/docker/library/nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "18080:80"
    volumes:
      - type: bind
        source: ./docs
        target: /usr/share/nginx/html
        read_only: true

  kodi:
    image: fhriley/kodi-headless-novnc:Omega
    init: true
    restart: unless-stopped
    depends_on:
      - repo
    ports:
      - "18000:8000"
      - "18081:8080"
      - "19090:9090"
      - "19777:9777/udp"
      - "15900:5900"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TZ: "${TZ:-Europe/Madrid}"
    volumes:
      - type: bind
        source: ./local-testing/kodi-data
        target: /data
